# ============================================================================
# GENERAL SETTINGS
# ============================================================================

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# Change base command
set -g prefix C-s
unbind C-b

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ============================================================================
# PANE & WINDOW NAVIGATION
# ============================================================================

# Intuitive pane splitting with current path
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation (with fallback for tmux-navigator)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Alt + arrow keys for quick pane resizing
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Window navigation
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Quick window creation with lazy git
# bind l new-window -c "#{pane_current_path}" 'lazygit'
bind l display-popup -w "90%" -h "90%" -E -d "#{pane_current_path}" "lazygit"

# Opencode new window (new / continue / list)
bind O new-window -n "opencode" -c "#{pane_current_path}" "opencode-tmux-session prompt"
bind C-o new-window -n "opencode" -c "#{pane_current_path}" "opencode-tmux-session continue"

# New window with current path
bind c new-window -c "#{pane_current_path}"

# ============================================================================
# COPY MODE & SCROLLING
# ============================================================================

# Enable vi mode
setw -g mode-keys vi

# Fast scroll with Ctrl+Shift+Up/Down
bind -n C-S-Up copy-mode \; send-keys -X page-up
bind -n C-S-Down copy-mode \; send-keys -X page-down

# Vi-style copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# copy to windows clipboard via win32yank
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"

# ============================================================================
# VISUAL ENHANCEMENTS
# ============================================================================

# Pane borders and active pane highlighting
set -g pane-border-style "fg=color8"
set -g pane-active-border-style "fg=color4"
set -g pane-border-lines heavy

# Status bar position
set-option -g status-position top

# Message styling
set -g message-command-style "fg=color7,bg=color0"
set -g message-style "fg=color7,bg=color0"

set -sg escape-time 0

# ============================================================================
# CATPPUCCIN PLUGIN CONFIGURATION
# ============================================================================

set -g @catppuccin_flavor "mocha"

# Window status styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_number_position "left"

# Window text configuration
set -g @catppuccin_window_text " #(basename #{pane_current_path})"
set -g @catppuccin_window_default_text " #(basename #{pane_current_path})"
set -g @catppuccin_window_current_text " #(basename #{pane_current_path})"

# Custom separator for cleaner look
set -g window-status-separator " "

# Status bar left (session info)
set -g status-left-length 100
set -g status-left ""

# Status bar right (minimal)
set -g status-right-length 80
set -g status-right "%H:%M | %d-%m-%Y     "

# ============================================================================
# PLUGINS
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings (auto-save and restore)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Resurrect settings
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# ============================================================================
# INITIALIZE TPM (keep at bottom)
# ============================================================================

run ~/.tmux/plugins/tmux/catppuccin.tmux
run '~/.tmux/plugins/tpm/tpm'
